<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logging Tool</title>
    <link rel="manifest" href="public/src/manifest.json" />
    <link rel="stylesheet" href="/public/src/css/style.css" />
    <link rel="stylesheet" href="/public/src/css/checklist.css" />
    <link rel="stylesheet" href="/public/src/css/logging.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <select name="pair" id="pair">
      <optgroup label="Forex Majors">
        <option value="EURUSD">EURUSD</option>
        <option value="GBPUSD">GBPUSD</option>
        <option value="USDJPY">USDJPY</option>
        <option value="USDCHF">USDCHF</option>
        <option value="USDCAD">USDCAD</option>
        <option value="AUDUSD">AUDUSD</option>
        <option value="NZDUSD">NZDUSD</option>
      </optgroup>
    </select>
    <div class="form_container">
      <form
        x-show="activeTab === 'logging'"
        class="trade_entry_form active"
        id="tradeform"
        method="POST"
        x-transition.opacity
        x-cloak
      >
        <div class="button_group">
          <input type="radio" id="buy" name="trade_type" />
          <label class="buy left" for="buy">Buy</label>

          <input type="radio" id="sell" name="trade_type" />
          <label class="sell right" for="sell">Sell</label>
        </div>
        <div class="input_container">
          <input
            class="entry"
            type="number"
            name=""
            id=""
            placeholder="Entry"
          />
          <input class="stop" type="number" name="" id="" placeholder="Stop" />
          <input
            class="tp"
            type="number"
            name=""
            id=""
            placeholder="Take Profit"
          />
        </div>
        <div class="button_group">
          <input type="radio" id="win" name="result" />
          <label class="win left" for="win">Win</label>

          <input type="radio" id="loss" name="result" />
          <label class="loss right" for="loss">Loss</label>
        </div>
        <button class="log_trade_button">Log Trade</button>
      </form>

      <div
        x-show="activeTab === 'checklist'"
        class="checklist_container"
        x-transition.opacity
        x-cloak
      >
        <div class="checklist_item_container">
          <div
            x-data="{isGo: false}"
            class="condition_container"
            :class="{'condition_container_go': isGo}"
          >
            <button
              @click="isGo = !isGo"
              class="go_button"
              :class="{'go_button_go': isGo}"
              x-text="isGo ? 'GO' : 'NO GO'"
            ></button>
            <p>HTF Alignment</p>
          </div>
          <div
            x-data="{isGo: false}"
            class="condition_container"
            :class="{'condition_container_go': isGo}"
          >
            <button
              @click="isGo = !isGo"
              class="go_button"
              :class="{'go_button_go': isGo}"
              x-text="isGo ? 'GO' : 'NO GO'"
            ></button>
            <p>Liquidity Sweep</p>
          </div>
          <div
            x-data="{isGo: false}"
            class="condition_container"
            :class="{'condition_container_go': isGo}"
          >
            <button
              @click="isGo = !isGo"
              class="go_button"
              :class="{'go_button_go': isGo}"
              x-text="isGo ? 'GO' : 'NO GO'"
            ></button>
            <p>BOS & Imbalance</p>
          </div>
          <div
            x-data="{isGo: false}"
            class="condition_container"
            :class="{'condition_container_go': isGo}"
          >
            <button
              @click="isGo = !isGo"
              class="go_button"
              :class="{'go_button_go': isGo}"
              x-text="isGo ? 'GO' : 'NO GO'"
            ></button>
            <p>71% Retracement</p>
          </div>
        </div>
      </div>
    </div>

    <script defer src="/public/src/js/app.js"></script>
    <script defer src="/public/src/js/logging.js"></script>
    <script defer src="/public/src/js/checklist.js"></script>
  </body>
</html>
