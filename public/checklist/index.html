<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checklist</title>
    <link rel="manifest" href="../src/manifest.json" />
    <link rel="stylesheet" href="/public/src/css/stlye.css" />
    <link rel="stylesheet" href="/public/src/css/checklist.css" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div class="Tabs">
      <a href="/index.html" class="Tab">Logging Tool</a>
      <a class="Tab selected">Checklist</a>
    </div>

    <div class="main_container">
      <div class="selection_container">
        <select name="pair" id="pair">
          <option value="EURUSD">EURUSD</option>
          <option value="GBPUSD">GBPUSD</option>
          <option value="AUDUSD">AUDUSD</option>
        </select>
      </div>
      <div class="condition_container">
        <button class="go_button">NO GO</button>
        <p>BOS & Imbalance</p>
      </div>
      <div class="condition_container">
        <button class="go_button">NO GO</button>
        <p>HTF Alignment</p>
      </div>
      <div class="condition_container">
        <button class="go_button">NO GO</button>
        <p>Liquidity Sweep</p>
      </div>
      <div class="condition_container">
        <button class="go_button">NO GO</button>
        <p>71% Retracement</p>
      </div>
    </div>
    <script defer src="/public/src/js/app.js"></script>
    <script defer src="/public/src/js/checklist.js"></script>
  </body>
</html>
